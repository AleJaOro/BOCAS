<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Clientes — Bocas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/business.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">B</div>
        <div>
          <div class="brand-text" id="bizBrand">Bocas</div>
          <div class="brand-sub">Negocio</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="/business/"><span>🧾</span> Pedidos</a>
        <a class="nav-item" href="/business/menu.html"><span>📋</span> Menú</a>
        <a class="nav-item" href="/business/locations.html"><span>📍</span> Express</a>
        <a class="nav-item active" href="/business/clients.html"><span>👥</span> Clientes</a>
        <a class="nav-item" href="/business/stats.html"><span>📊</span> Estadísticas</a>
        <a class="nav-item" href="/business/settings.html"><span>⚙️</span> Ajustes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">N</div>
          <div class="user-meta">
            <div class="user-name" id="userName">Negocio</div>
            <div class="user-role" id="userRole">Panel</div>
          </div>
        </div>
        <button type="button" class="btn btn-ghost btn-sm w-full mt-1" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-toggle" id="menuToggle">☰</button>
          <h1 class="page-title">Clientes</h1>
        </div>
        <button type="button" class="btn btn-primary btn-sm" id="openAdd">+ Cliente</button>
      </header>

      <div class="page-content">
        <div class="toolbar">
          <input type="search" class="form-input search-input" id="search" placeholder="Buscar nombre o teléfono…" />
        </div>
        <p class="muted small mb-2">Solo visible en el panel del negocio. Al crear un pedido manual, busca aquí para auto-rellenar datos.</p>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Pedidos</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="cliModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="cliTitle">Nuevo cliente</h3>
        <button type="button" class="btn btn-ghost btn-icon" id="closeCli">×</button>
      </div>
      <form id="cliForm">
        <input type="hidden" id="cliId" />
        <div class="form-group">
          <label class="form-label" for="cliName">Nombre *</label>
          <input class="form-input" id="cliName" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="cliPhone">Teléfono *</label>
          <input class="form-input" id="cliPhone" required placeholder="88887777" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cliAddress">Dirección</label>
          <input class="form-input" id="cliAddress" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cliNotes">Notas</label>
          <textarea class="form-textarea" id="cliNotes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelCli">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { requireRole } from '/js/auth.js';
    import { initShell } from '/js/shell.js';
    import { getBusiness } from '/js/business/settings.js';
    import {
      listClients,
      addClient,
      updateClient,
      deleteClient,
      renderClientsTable
    } from '/js/business/clients.js';
    import { toast, confirmDialog } from '/js/notifications.js';

    const session = await requireRole('business');
    if (!session) throw new Error('auth');
    const businessId = session.profile.businessId;
    const business = await getBusiness(businessId);
    initShell({ userName: session.profile.name, roleLabel: business?.name || 'Negocio' });
    document.getElementById('bizBrand').textContent = business?.name || 'Bocas';

    let clients = [];
    const tbody = document.getElementById('tbody');
    const modal = document.getElementById('cliModal');

    async function refresh() {
      clients = await listClients(businessId);
      apply();
    }

    function apply() {
      const q = (document.getElementById('search').value || '').toLowerCase();
      const list = q
        ? clients.filter(
            (c) =>
              (c.name || '').toLowerCase().includes(q) ||
              String(c.phone || '').includes(q)
          )
        : clients;
      renderClientsTable(list, tbody);
    }

    document.getElementById('search').addEventListener('input', apply);

    const openM = (c) => {
      document.getElementById('cliId').value = c?.id || '';
      document.getElementById('cliTitle').textContent = c ? 'Editar cliente' : 'Nuevo cliente';
      document.getElementById('cliName').value = c?.name || '';
      document.getElementById('cliPhone').value = c?.phone || '';
      document.getElementById('cliAddress').value = c?.address || '';
      document.getElementById('cliNotes').value = c?.notes || '';
      modal.classList.remove('hidden');
      requestAnimationFrame(() => modal.classList.add('modal-in'));
    };
    const closeM = () => {
      modal.classList.add('modal-out');
      setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('modal-in', 'modal-out');
      }, 200);
    };

    document.getElementById('openAdd').addEventListener('click', () => openM(null));
    document.getElementById('closeCli').addEventListener('click', closeM);
    document.getElementById('cancelCli').addEventListener('click', closeM);

    document.getElementById('cliForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('cliId').value;
      const data = {
        name: document.getElementById('cliName').value,
        phone: document.getElementById('cliPhone').value,
        address: document.getElementById('cliAddress').value,
        notes: document.getElementById('cliNotes').value
      };
      try {
        if (id) await updateClient(businessId, id, data);
        else await addClient(businessId, data);
        toast('Cliente guardado', 'success');
        closeM();
        await refresh();
      } catch (err) {
        toast(err.message || 'Error', 'error');
      }
    });

    tbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.act === 'edit') openM(clients.find((c) => c.id === id));
      if (btn.dataset.act === 'del') {
        const ok = await confirmDialog({
          title: 'Eliminar cliente',
          message: '¿Seguro que deseas eliminar este cliente?',
          confirmText: 'Eliminar',
          danger: true
        });
        if (!ok) return;
        await deleteClient(businessId, id);
        toast('Eliminado', 'info');
        await refresh();
      }
    });

    await refresh();
  </script>
</body>
</html>
