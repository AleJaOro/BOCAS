<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Express — Bocas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/business.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">B</div>
        <div>
          <div class="brand-text" id="bizBrand">Bocas</div>
          <div class="brand-sub">Negocio</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="./"><span>🧾</span> Pedidos</a>
        <a class="nav-item" href="menu.html"><span>📋</span> Menú</a>
        <a class="nav-item active" href="locations.html"><span>📍</span> Express</a>
        <a class="nav-item" href="clients.html"><span>👥</span> Clientes</a>
        <a class="nav-item" href="stats.html"><span>📊</span> Estadísticas</a>
        <a class="nav-item" href="settings.html"><span>⚙️</span> Ajustes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">N</div>
          <div class="user-meta">
            <div class="user-name" id="userName">Negocio</div>
            <div class="user-role" id="userRole">Panel</div>
          </div>
        </div>
        <button type="button" class="btn btn-ghost btn-sm w-full mt-1" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-toggle" id="menuToggle">☰</button>
          <h1 class="page-title">Ubicaciones express</h1>
        </div>
        <button type="button" class="btn btn-primary btn-sm" id="openAdd">+ Ubicación</button>
      </header>

      <div class="page-content">
        <p class="muted small mb-2">Estas zonas aparecen en el menú digital y en pedidos manuales con su tarifa de envío.</p>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Tarifa express</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="locModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="locTitle">Nueva ubicación</h3>
        <button type="button" class="btn btn-ghost btn-icon" id="closeLoc">×</button>
      </div>
      <form id="locForm">
        <input type="hidden" id="locId" />
        <div class="form-group">
          <label class="form-label" for="locName">Nombre del lugar *</label>
          <input class="form-input" id="locName" required placeholder="Ej: Centro, Barrio Norte…" />
        </div>
        <div class="form-group">
          <label class="form-label" for="locFee">Tarifa express (₡) *</label>
          <input class="form-input" type="number" id="locFee" required min="0" placeholder="1000" />
        </div>
        <label class="form-check mb-2">
          <input type="checkbox" id="locActive" checked /> Activa
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelLoc">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { requireRole } from '../js/auth.js';
    import { initShell } from '../js/shell.js';
    import { getBusiness } from '../js/business/settings.js';
    import {
      listLocations,
      addLocation,
      updateLocation,
      deleteLocation,
      renderLocationsTable
    } from '../js/business/locations.js';
    import { toast, confirmDialog } from '../js/notifications.js';

    const session = await requireRole('business');
    if (!session) throw new Error('auth');
    const businessId = session.profile.businessId;
    const business = await getBusiness(businessId);
    initShell({ userName: session.profile.name, roleLabel: business?.name || 'Negocio' });
    document.getElementById('bizBrand').textContent = business?.name || 'Bocas';

    let locations = [];
    const tbody = document.getElementById('tbody');
    const modal = document.getElementById('locModal');

    async function refresh() {
      locations = await listLocations(businessId);
      renderLocationsTable(locations, tbody);
    }

    const openM = (loc) => {
      document.getElementById('locId').value = loc?.id || '';
      document.getElementById('locTitle').textContent = loc ? 'Editar ubicación' : 'Nueva ubicación';
      document.getElementById('locName').value = loc?.name || '';
      document.getElementById('locFee').value = loc?.expressFee ?? '';
      document.getElementById('locActive').checked = loc?.active !== false;
      modal.classList.remove('hidden');
      requestAnimationFrame(() => modal.classList.add('modal-in'));
    };
    const closeM = () => {
      modal.classList.add('modal-out');
      setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('modal-in', 'modal-out');
      }, 200);
    };

    document.getElementById('openAdd').addEventListener('click', () => openM(null));
    document.getElementById('closeLoc').addEventListener('click', closeM);
    document.getElementById('cancelLoc').addEventListener('click', closeM);

    document.getElementById('locForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('locId').value;
      const data = {
        name: document.getElementById('locName').value,
        expressFee: document.getElementById('locFee').value,
        active: document.getElementById('locActive').checked
      };
      try {
        if (id) await updateLocation(businessId, id, data);
        else await addLocation(businessId, data);
        toast('Ubicación guardada', 'success');
        closeM();
        await refresh();
      } catch (err) {
        toast(err.message || 'Error', 'error');
      }
    });

    tbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.act === 'edit') openM(locations.find((l) => l.id === id));
      if (btn.dataset.act === 'del') {
        const ok = await confirmDialog({
          title: 'Eliminar ubicación',
          message: '¿Seguro?',
          confirmText: 'Eliminar',
          danger: true
        });
        if (!ok) return;
        await deleteLocation(businessId, id);
        toast('Eliminada', 'info');
        await refresh();
      }
    });

    await refresh();
  </script>
</body>
</html>
