<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Ingresar — Bocas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand-mark">B</div>
        <h1>Bienvenido</h1>
        <p class="muted small">Ingresa a tu panel de Bocas</p>
      </div>

      <div id="authError" class="auth-error" role="alert"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Correo</label>
          <input class="form-input" type="email" id="email" name="email" required placeholder="tu@correo.com" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          Ingresar
        </button>
      </form>

      <p class="text-center muted small mt-2">
        <a href="/">← Volver al inicio</a>
        ·
        <a href="/setup.html">Setup admin</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login, waitForAuth, getUserProfile } from '/js/auth.js';
    import { lockViewportZoom } from '/js/utils.js';
    import { toast } from '/js/notifications.js';

    lockViewportZoom();

    // Redirect if already logged in
    (async () => {
      const user = await waitForAuth();
      if (!user) return;
      const profile = await getUserProfile(user.uid);
      if (profile?.role === 'admin') location.href = '/admin/';
      else if (profile?.role === 'business') location.href = '/business/';
    })();

    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('authError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Ingresando…';
      try {
        const { profile } = await login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        toast('Sesión iniciada', 'success');
        if (profile.role === 'admin') location.href = '/admin/';
        else location.href = '/business/';
      } catch (err) {
        const msg = mapError(err);
        errEl.textContent = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });

    function mapError(err) {
      const code = err?.code || '';
      if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
        return 'Correo o contraseña incorrectos.';
      }
      if (code === 'auth/too-many-requests') return 'Demasiados intentos. Espera un momento.';
      if (code === 'auth/invalid-email') return 'Correo no válido.';
      return err?.message || 'No se pudo iniciar sesión.';
    }
  </script>
</body>
</html>
